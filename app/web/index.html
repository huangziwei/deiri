<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Deiri</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <div id="nav-buttons" role="group">
          <button id="nav-back" title="Back">‹</button>
          <button id="nav-forward" title="Forward">›</button>
        </div>
        <button id="new-folder-btn" title="New Folder" aria-label="New Folder" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.2" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 5.25c0-.55.45-1 1-1h2.4c.27 0 .52.1.71.29l.8.8H13c.55 0 1 .45 1 1v5.4c0 .55-.45 1-1 1H3c-.55 0-1-.45-1-1z"/>
            <path d="M8 7.6v3.2M6.4 9.2h3.2" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="filter-pills" role="group" aria-label="Filter by format"></div>
        <input id="search-input" type="search" spellcheck="false" autocomplete="off"
               placeholder="Search" aria-label="Search"
               title="Search this folder. Start with all: to search the whole device." disabled />
        <div id="view-toggle" role="group">
          <button id="view-list" class="active" title="List view">☰</button>
          <button id="view-grid" title="Grid view">▦</button>
        </div>
      </header>
      <div id="list-container">
        <table id="list">
          <thead>
            <tr>
              <th data-sort="name">Name</th>
              <th data-sort="size">Size</th>
              <th data-sort="modified">Date Modified</th>
            </tr>
          </thead>
          <tbody id="list-body"></tbody>
        </table>
        <div id="grid" hidden></div>
        <div id="empty">No device selected.</div>
      </div>
      <div class="path-bar">
        <button id="device-chip" type="button" title="Go to device root">
          <span id="device-chip-label">No device</span>
          <span id="device-chip-chevron" aria-hidden="true" title="Switch device">▾</span>
        </button>
        <input id="device-rename" type="text" spellcheck="false"
               aria-label="Device name" maxlength="64" hidden />
        <nav id="breadcrumb"></nav>
      </div>
      <div id="transfer-bar" hidden>
        <div id="transfer-info">
          <span id="transfer-label"></span>
          <span id="transfer-count"></span>
        </div>
        <div id="transfer-track"><div id="transfer-fill"></div></div>
        <button id="transfer-cancel" type="button">Cancel</button>
      </div>
      <div id="search-strip" hidden>
        <span id="search-status"></span>
        <button id="search-cancel" type="button">Cancel</button>
      </div>
      <footer id="status-bar"><span id="status"></span></footer>
      <div id="dropzone-overlay" hidden>Drop to upload</div>
      <ul id="context-menu" hidden></ul>
      <div id="device-menu" hidden role="menu"></div>
    </main>
    <script src="api.js"></script>
    <script src="main.js"></script>
  </body>
</html>
